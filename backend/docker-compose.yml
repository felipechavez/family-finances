services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=FinanceApp
      - Jwt__Audience=FinanceApp
      - MailerSend__SmtpUser=${MAILERSEND_SMTP_USER}
      - MailerSend__SmtpPassword=${MAILERSEND_SMTP_PASSWORD}
      - MailerSend__FromAddress=${MAILERSEND_FROM_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped