<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f8f7ff;font-family:'Segoe UI',Arial,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f7ff;padding:40px 16px">
    <tr><td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e8e5ff">
        <!-- Header -->
        <tr>
          <td style="background:#ffffff;border-bottom:4px solid #7c3aed;padding:28px 32px;text-align:center">
            <img src="{{LOGO_URL}}" alt="DomusPay" height="100" style="display:block;margin:0 auto">
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding:36px 32px">
            <h2 style="margin:0 0 8px;font-size:20px;font-weight:700;color:#1a1a2e">Verifica tu dirección de email</h2>
            <p style="margin:0 0 24px;color:#555577;font-size:15px;line-height:1.6">
              Hola <strong>{{NOMBRE}}</strong>, haz clic en el botón para activar tu cuenta:
            </p>
            <table cellpadding="0" cellspacing="0"><tr><td align="center">
              <a href="{{LINK}}"
                 style="display:inline-block;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#ffffff;
                        text-decoration:none;padding:14px 32px;border-radius:12px;font-weight:600;font-size:15px">
                Verificar email
              </a>
            </td></tr></table>
            <p style="margin:24px 0 0;color:#9999bb;font-size:12px;line-height:1.6">
              Este enlace expira en 24 horas. Si no creaste esta cuenta, ignora este correo.
            </p>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="background:#f8f7ff;border-top:1px solid #e8e5ff;padding:16px 32px;text-align:center">
            <p style="margin:0;color:#9999bb;font-size:12px">&copy; DomusPay Familiar</p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
